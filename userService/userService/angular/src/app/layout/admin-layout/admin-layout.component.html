<div class="container-fluid">
  <div class="row">
    <!-- Sidebar -->
    <nav class="col-md-2 d-none d-md-block sidebar text-white">
      <div class="position-sticky pt-3">
        <h5 class="px-3">Admin</h5>
        <ul class="nav flex-column">
          <li class="nav-item">
            <a
              class="nav-link"
              routerLink="/admin/dashboard"
              routerLinkActive="active"
            >
              <i class="bi bi-calendar-event"></i>
              <span>Dashboard</span>
            </a>
          </li>
          <li class="nav-item">
            <a
              class="nav-link"
              routerLink="/admin/eventos"
              routerLinkActive="active"
            >
              <i class="bi bi-calendar-event"></i>
              <span>Eventos</span>
            </a>
          </li>
          <li class="nav-item">
            <a
              class="nav-link"
              routerLink="/admin/menus"
              routerLinkActive="active"
            >
              <i class="bi bi-book"></i>
              <span>Menús</span>
            </a>
          </li>
          <li class="nav-item">
            <a
              class="nav-link"
              routerLink="/admin/mesas"
              routerLinkActive="active"
            >
              <i class="bi bi-grid-3x3"></i>
              <span>Mesas</span>
            </a>
          </li>
          <li class="nav-item">
            <a
              class="nav-link"
              routerLink="/admin/empleado"
              routerLinkActive="active"
            >
              <i class="bi bi-people-fill"></i>
              <span>Empleados</span>
            </a>
          </li>

          <li class="nav-item">
            <a
              class="nav-link"
              routerLink="/admin/reportes"
              routerLinkActive="active"
            >
              <i class="bi bi-people-fill"></i>
              <span>Reportes</span>
            </a>
          </li>
        </ul>
      </div>
    </nav>

    <!-- Main Content -->
    <main class="col-md-10 ms-sm-auto">
      <header class="d-flex justify-content-between align-items-center">
        <h2>
          <i class="bi bi-speedometer2 me-2" style="color: #c67c4e"></i>
          Panel de Administración
        </h2>
        <button class="btn btn-outline-secondary" (click)="logout()">
          <i class="bi bi-box-arrow-right me-2"></i>
          Cerrar sesión
        </button>
      </header>

      <router-outlet></router-outlet>
    </main>
  </div>
</div>
