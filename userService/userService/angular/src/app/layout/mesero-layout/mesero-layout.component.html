<div class="dashboard-container">
  <!-- Sidebar -->
  <aside class="sidebar" [class.collapsed]="sidebarCollapsed">
    <div class="sidebar-header">
      <div class="logo">
        <span class="fs-3">🍜</span>
        <span *ngIf="!sidebarCollapsed" class="logo-text">KoroFood</span>
      </div>
      <button class="toggle-btn" (click)="toggleSidebar()">
        <span class="icon">{{ sidebarCollapsed ? '→' : '←' }}</span>
      </button>
    </div>

    <nav class="sidebar-nav">
      <a routerLink="/mesero/ordenes" routerLinkActive="active" class="nav-item">
        <span class="nav-icon">📋</span>
        <span *ngIf="!sidebarCollapsed" class="nav-label">Órdenes</span>
      </a>

      <a routerLink="/mesero/nueva-orden" routerLinkActive="active" class="nav-item">
        <span class="nav-icon">➕</span>
        <span *ngIf="!sidebarCollapsed" class="nav-label">Nueva Orden</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar">{{ getUserInitials() }}</div>
        <div *ngIf="!sidebarCollapsed" class="user-details">
          <span class="user-name">{{ userName }}</span>
          <span class="user-role">Mesero</span>
        </div>
      </div>
      <button *ngIf="!sidebarCollapsed" class="logout-btn" (click)="logout()">
        <span class="icon">🚪</span>
        Cerrar Sesión
      </button>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <!-- Top Bar -->
    <header class="top-bar">
      <div class="top-bar-left">
        <h1 class="page-title">{{ getPageTitle() }}</h1>
        <span class="current-time">{{ currentTime | date:'short' }}</span>
      </div>
    </header>

    <!-- Content Area -->
    <div class="content-area">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
