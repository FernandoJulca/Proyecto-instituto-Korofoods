<div class="chat-window-container">
  <!-- Empty State -->
  <div *ngIf="!chat" class="empty-chat-state">
    <svg
      width="80"
      height="80"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="1.5"
    >
      <path
        d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"
      ></path>
      <line x1="9" y1="10" x2="15" y2="10"></line>
      <line x1="9" y1="14" x2="13" y2="14"></line>
    </svg>
    <h3>Selecciona un chat</h3>
    <p>Elige una conversación de la lista o inicia una nueva</p>
  </div>

  <!-- Chat Window -->
  <div *ngIf="chat" class="chat-window-content">
    <!-- Header -->
    <div class="chat-window-header">
      <div class="contact-info">
        <div class="contact-avatar">
          <img [src]="getAvatarUrl(chat.imagen)" [alt]="getContactName()" />
          <span class="status-indicator online"></span>
        </div>
        <div class="contact-details">
          <h3>{{ getContactName() }}</h3>
          <p class="status-text">En línea</p>
        </div>
      </div>

      <div class="chat-actions">
        <button class="btn-icon" title="Buscar">
          <svg
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <circle cx="11" cy="11" r="8"></circle>
            <path d="m21 21-4.35-4.35"></path>
          </svg>
        </button>
        <button class="btn-icon" title="Videollamada">
          <svg
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <polygon points="23 7 16 12 23 17 23 7"></polygon>
            <rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect>
          </svg>
        </button>
        <button class="btn-icon" title="Llamar">
          <svg
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path
              d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"
            ></path>
          </svg>
        </button>
        <button class="btn-icon" title="Más opciones">
          <svg
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <circle cx="12" cy="12" r="1"></circle>
            <circle cx="12" cy="5" r="1"></circle>
            <circle cx="12" cy="19" r="1"></circle>
          </svg>
        </button>
      </div>
    </div>

    <!-- Messages Container -->
    <div #messagesContainer class="messages-container">
      <!-- Loading -->
      <div *ngIf="isLoading" class="loading-indicator">
        <div class="spinner"></div>
        <p>Cargando mensajes...</p>
      </div>

      <!-- Messages -->
      <div *ngIf="!isLoading" class="messages-list">
        <!-- Date Separator -->
        <div class="date-separator">
          <!--<span>Hoy, {{ new Date() | date: 'longDate' }}</span>-->
        </div>

        <!-- Message Bubbles -->
        <div
          *ngFor="let mensaje of mensajes"
          class="message-wrapper"
          [class.my-message]="isMyMessage(mensaje)"
          [class.other-message]="!isMyMessage(mensaje)"
        >
          <div class="message-bubble">
            <p class="message-text">{{ mensaje.contenido }}</p>
            <div class="message-meta">
              <span class="message-time">{{
                formatMessageTime(mensaje.fechaMandado)
              }}</span>
              <svg
                *ngIf="isMyMessage(mensaje)"
                class="message-check"
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <polyline points="20 6 9 17 4 12"></polyline>
              </svg>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Input Area -->
    <div class="chat-input-container">
      <div class="input-wrapper">
        <button class="btn-icon" title="Adjuntar">
          <svg
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path
              d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"
            ></path>
          </svg>
        </button>

        <button class="btn-icon" title="Emoji">
          <svg
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <circle cx="12" cy="12" r="10"></circle>
            <path d="M8 14s1.5 2 4 2 4-2 4-2"></path>
            <line x1="9" y1="9" x2="9.01" y2="9"></line>
            <line x1="15" y1="9" x2="15.01" y2="9"></line>
          </svg>
        </button>

        <input
          type="text"
          placeholder="Escribe tu mensaje"
          [(ngModel)]="newMessage"
          (keypress)="onKeyPress($event)"
          [disabled]="isSending"
        />

        <button
          class="btn-send"
          (click)="sendMessage()"
          [disabled]="!newMessage.trim() || isSending"
          title="Enviar mensaje"
        >
          <svg
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
    </div>
  </div>
</div>
