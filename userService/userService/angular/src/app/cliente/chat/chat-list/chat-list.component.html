<div class="chat-list-container">
  <!-- Header -->
  <div class="chat-list-header">
    <div class="header-content">
      <div class="title-section">
        <div class="icon-wrapper">
          <svg
            width="32"
            height="32"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path
              d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"
            ></path>
          </svg>
        </div>
        <h2>Chats</h2>
      </div>
      <button
        class="btn-new-chat"
        (click)="openNewChatModal()"
        title="Nuevo chat"
      >
        <svg
          width="20"
          height="20"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <line x1="12" y1="5" x2="12" y2="19"></line>
          <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
      </button>
    </div>

    <!-- Search Bar -->
    <div class="search-bar">
      <svg
        class="search-icon"
        width="18"
        height="18"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
      >
        <circle cx="11" cy="11" r="8"></circle>
        <path d="m21 21-4.35-4.35"></path>
      </svg>
      <input
        type="text"
        placeholder="Buscar contactos o mensajes"
        [(ngModel)]="searchQuery"
        (input)="onSearchChange()"
      />
    </div>
  </div>

  <!-- Chat List -->
  <div class="chat-list-content">
    <!-- Empty State -->
    <div *ngIf="filteredChats.length === 0" class="empty-state">
      <svg
        width="64"
        height="64"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="1.5"
      >
        <path
          d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"
        ></path>
      </svg>
      <p>No hay conversaciones</p>
      <button class="btn-primary" (click)="openNewChatModal()">
        Iniciar chat
      </button>
    </div>

    <!-- Chat Items -->
    <div class="chat-items">
      <div
        *ngFor="let chat of filteredChats"
        class="chat-item"
        [class.active]="chat.chatId === selectedChatId"
        (click)="selectChat(chat)"
      >
        <div class="avatar">
          <img [src]="getAvatarUrl(chat.imagen)" [alt]="chat.nombre" />
          <span class="status-indicator online"></span>
        </div>

        <div class="chat-info">
          <div class="chat-header">
            <h3 class="chat-name">{{ chat.nombre }} {{ chat.apePaterno }}</h3>
            <span class="chat-time">{{
              formatTime(chat.fechaUltimoMensaje)
            }}</span>
          </div>
          <p class="last-message">{{ truncateMessage(chat.ultimoMensaje) }}</p>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Modal: Nuevo Chat -->
<div
  class="modal-overlay"
  *ngIf="showNewChatModal"
  (click)="closeNewChatModal()"
>
  <div class="modal-content" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h3>Nuevo Chat</h3>
      <button class="btn-close" (click)="closeNewChatModal()">
        <svg
          width="20"
          height="20"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>

    <div class="modal-body">
      <p class="modal-subtitle">Contactos</p>

      <div class="contacts-list">
        <div
          *ngFor="let recepcionista of recepcionistas"
          class="contact-item"
          [class.selected]="recepcionista.idUsuario === selectedRecepcionistaId"
          (click)="selectRecepcionista(recepcionista.idUsuario)"
        >
          <div class="contact-avatar">
            <img
              [src]="getAvatarUrl(recepcionista.imagen)"
              [alt]="recepcionista.nombres"
            />
          </div>
          <div class="contact-info">
            <h4>{{ recepcionista.nombres }} {{ recepcionista.apePaterno }}</h4>
            <p>Recepcionista</p>
          </div>
          <div class="contact-checkbox">
            <input
              type="radio"
              [checked]="recepcionista.idUsuario === selectedRecepcionistaId"
              (change)="selectRecepcionista(recepcionista.idUsuario)"
            />
          </div>
        </div>
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn-secondary" (click)="closeNewChatModal()">
        Cancelar
      </button>
      <button class="btn-primary" (click)="startNewChat()">Iniciar Chat</button>
    </div>
  </div>
</div>
